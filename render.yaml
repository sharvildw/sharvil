# ── Render deployment config ─────────────────────────────────────────────────
# Deploy backend to Render: https://render.com
# 1. Connect your GitHub repo
# 2. Create a new Web Service
# 3. Use settings below

services:
  - type: web
    name: portfolio-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set in Render dashboard
      - key: CLIENT_URL
        sync: false          # Set to your Vercel frontend URL
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_TO
        sync: false
